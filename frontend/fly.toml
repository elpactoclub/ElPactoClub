app = 'elpactoclub-frontend'
primary_region = 'cdg'

[build]
  [build.args]
    NEXT_PUBLIC_API_URL = 'https://elpactoclub.fly.dev/api/v1'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
