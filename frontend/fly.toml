# fly.toml app configuration file generated for elpactoclub-frontend on 2026-05-22T16:38:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'elpactoclub-frontend'
primary_region = 'gru'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
