# Rename 'elpacto-api' to your chosen Fly.io app name
# Run: fly apps create elpacto-api   (once, before first deploy)
app = 'elpacto-api'
primary_region = 'mad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '4000'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
